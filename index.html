<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --red:#B0142E; --red-dark:#8E1025;
    --titanium:#77736F; --ink:#1D1B19;
    --paper:#FFFFFF; --bg:#FBFAF9; --line:#ECEAE8; --hint:#B8B4AF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;align-items:center;
    -webkit-font-smoothing:antialiased;
  }

  header{width:100%;padding:34px 20px 20px;text-align:center}
  header h1{font-size:30px;font-weight:600;letter-spacing:-0.02em}

  main{width:100%;max-width:680px;flex:1;display:flex;flex-direction:column;padding:0 18px}
  #chat{
    flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding:8px 2px 20px;
  }
  .msg{
    max-width:78%;padding:13px 17px;border-radius:20px;
    line-height:1.5;white-space:pre-wrap;font-size:15.5px;
    animation:rise .28s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.msg{animation:none}}
  .msg.user{align-self:flex-end;background:var(--red);color:#fff;border-bottom-right-radius:6px}
  .msg.edi{
    align-self:flex-start;background:var(--paper);
    border:1px solid var(--line);border-bottom-left-radius:6px;
    box-shadow:0 1px 2px rgba(29,27,25,.03);
  }
  .chips{align-self:flex-start;display:flex;flex-wrap:wrap;gap:8px;margin:2px 0}
  .chips button{
    font:inherit;font-size:14px;font-weight:500;color:var(--ink);background:var(--paper);
    border:1px solid var(--line);border-radius:999px;padding:8px 16px;cursor:pointer;transition:all .15s;
  }
  .chips button:hover,.chips button:focus-visible{border-color:var(--red);color:var(--red);outline:none}
  .thinking{
    align-self:flex-start;display:flex;gap:5px;padding:15px 18px;background:var(--paper);
    border:1px solid var(--line);border-radius:20px;border-bottom-left-radius:6px;
  }
  .thinking span{width:7px;height:7px;border-radius:50%;background:var(--titanium);opacity:.35;animation:beat 1s infinite}
  .thinking span:nth-child(2){animation-delay:.18s}
  .thinking span:nth-child(3){animation-delay:.36s}
  @keyframes beat{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.9;transform:scale(1.2)}}

  form{
    width:100%;max-width:680px;display:flex;gap:10px;align-items:center;
    padding:12px 18px calc(20px + env(safe-area-inset-bottom));
    position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 34%);
  }
  #input{
    flex:1;font:inherit;font-size:16px;padding:14px 20px;
    border:1px solid var(--line);border-radius:999px;background:var(--paper);color:var(--ink);
    transition:border-color .15s,box-shadow .15s;
  }
  #input.hint{color:var(--hint)}
  #input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(176,20,46,.10)}
  #send{
    flex:none;width:46px;height:46px;border-radius:50%;border:none;background:var(--red);cursor:pointer;
    display:flex;align-items:center;justify-content:center;transition:background .15s;
  }
  #send:hover{background:var(--red-dark)}
  #send:focus-visible{outline:2px solid var(--red-dark);outline-offset:2px}
  #send svg{width:20px;height:20px;stroke:#fff;stroke-width:2.4;fill:none}

  /* ---------- Data loader overlay ---------- */
  #loader{
    position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
    background:var(--bg);padding:20px;
  }
  #loader .card{
    background:var(--paper);border:1.5px solid var(--line);border-radius:22px;
    padding:40px 34px;max-width:400px;width:100%;text-align:center;
    box-shadow:0 20px 50px rgba(29,27,25,.10);
    transition:border-color .15s,background .15s;
  }
  #loader .card.over{border-color:var(--red);border-style:dashed;background:#FDF7F8}
  #loader h2{font-size:22px;font-weight:600;letter-spacing:-0.01em;margin-bottom:8px}
  #loader p{color:var(--titanium);font-size:14px;margin-bottom:26px}
  #loader label{
    display:inline-block;font-weight:600;color:#fff;background:var(--red);
    border-radius:999px;padding:13px 30px;cursor:pointer;transition:background .15s;
  }
  #loader label:hover{background:var(--red-dark)}
  #loader input[type=file]{display:none}
  #loadError{color:var(--red);font-size:13px;margin-top:16px;min-height:1em}

  /* ---------- Developer menu (~) ---------- */
  #dev{
    position:fixed;inset:0;z-index:40;display:none;align-items:flex-start;justify-content:center;
    background:rgba(29,27,25,.35);backdrop-filter:blur(3px);padding:16vh 20px 20px;
  }
  #dev.open{display:flex}
  #dev .panel{
    background:var(--paper);border:1px solid var(--line);border-radius:20px;
    padding:26px 26px 22px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(29,27,25,.22);
  }
  #dev .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
  #dev h2{font-size:17px;font-weight:600}
  #dev .ver{font-size:12px;color:var(--titanium);font-weight:500}
  #dev label{display:block;font-size:12px;font-weight:600;color:var(--titanium);margin:0 0 6px}
  #dev input{
    width:100%;font:inherit;font-size:14px;padding:11px 14px;border:1px solid var(--line);
    border-radius:12px;background:var(--bg);color:var(--ink);margin-bottom:14px;
  }
  #dev input:focus{outline:none;border-color:var(--red)}
  #dev button{
    font:inherit;font-weight:600;font-size:14px;cursor:pointer;background:var(--red);color:#fff;
    border:none;border-radius:999px;padding:11px 20px;width:100%;
  }
  #dev button:hover{background:var(--red-dark)}
  #dev .msg-line{font-size:12.5px;margin-top:10px;min-height:1.1em}
  #dev .msg-line.err{color:var(--red)}
  #dev .msg-line.ok{color:#1a7f37}
  #dev .keys{display:none}
  #dev .keys.show{display:block}
  #dev .lock.hide{display:none}
  #dev .hintline{font-size:12px;color:var(--titanium);margin-top:4px}
</style>
</head>
<body>

<div id="dev" role="dialog" aria-label="Developer menu">
  <div class="panel">
    <div class="top"><h2>Developer</h2><span class="ver">murmur v2.3</span></div>
    <div class="lock" id="lockView">
      <label for="pw">Password</label>
      <input type="password" id="pw" autocomplete="off" placeholder="Enter password">
      <button id="unlock">Unlock</button>
    </div>
    <div class="keys" id="keysView">
      <label for="k1">Gemini API keys</label>
      <input type="password" id="k1" autocomplete="off" placeholder="API key 1 (primary)">
      <input type="password" id="k2" autocomplete="off" placeholder="API key 2 (backup)">
      <input type="password" id="k3" autocomplete="off" placeholder="API key 3 (backup)">
      <p class="hintline">Optional override — keys in the spreadsheet take priority. Saved in this browser. Press ~ to close.</p>
    </div>
    <div class="msg-line" id="devMsg"></div>
  </div>
</div>

<div id="loader">
  <div class="card">
    <h2>Welcome to Edi</h2>
    <p>Choose a spreadsheet to get started.</p>
    <label>Choose file<input type="file" id="file" accept=".xlsx,.xls"></label>
    <div id="loadError"></div>
  </div>
</div>

<header>
  <h1>Welcome to Edi</h1>
</header>

<main>
  <div id="chat" aria-live="polite"></div>
</main>

<form id="form" autocomplete="off">
  <input id="input" type="text" aria-label="Message Edi">
  <button id="send" type="submit" aria-label="Send">
    <svg viewBox="0 0 24 24"><path d="M12 19V5M6 11l6-6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</form>

<script>
/* ===================== CONFIG ===================== */
const MODEL = "gemini-2.5-flash-lite";
const DEV_PASSWORD = "cheeseburger";
const KEYS_STORAGE = "edi_api_keys";
const HINT_TEXT = "What can you do for me, Edi?";
const VERSION = "murmur v2.3";

/* Built-in fallbacks used only if Sheet 2 is missing or a value is blank */
const DEFAULT_RESP = {
  GREETING: "Hi, I'm Edi. What can I help you with?",
  NO_MATCH: "I'm not sure I can help with that one.",
  API_DOWN: "I'm having trouble answering right now. Please try again in a moment.",
  DEFAULT_OPTION: "Great choice — {label} it is!"
};
let RESP = { ...DEFAULT_RESP };
let SHEET_KEYS = ["", "", ""]; // API keys read from Sheet 2
let INTENTS = [];

/* ===================== NORMALIZE ===================== */
const normalize = (s) => s.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu, "").replace(/\s+/g, " ").trim();

/* ===================== SPREADSHEET LOADING ===================== */
/* Sheet 1 — the playbook:
     Column A = phrasings · Column B = response (a value starts a new topic;
     merged cells fine) · Column C = follow-up options · Column D = per-option reply.
   Sheet 2 — settings (optional):
     Column A = setting name (GREETING, NO_MATCH, API_DOWN, DEFAULT_OPTION,
     API_KEY_1/2/3) · Column B = value. Anything else is ignored. */
async function parseWorkbook(file){
  const wb = XLSX.read(await file.arrayBuffer());
  const intents  = parseIntents(wb.Sheets[wb.SheetNames[0]]);
  const settings = parseSettings(wb.SheetNames[1] ? wb.Sheets[wb.SheetNames[1]] : null);
  return { intents, resp: settings.resp, keys: settings.keys };
}

function parseIntents(ws){
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
  const clean = s => String(s ?? "").replace(/\r\n/g, "\n").trim();
  const lastCol = XLSX.utils.decode_range(ws["!ref"] || "A1").e.c; // 0-indexed last column

  // Merged cells only store their value in the top-left cell; every other
  // row reads back empty. Fill each merged range with its anchor value so
  // every column behaves the way it LOOKS in Excel (this covers the output
  // columns B, D, F, H … which are often merged across an option group).
  const bContinuation = new Set(); // rows that are merge continuations in column B
  (ws["!merges"] || []).forEach(m => {
    const val = (rows[m.s.r] || [])[m.s.c] ?? "";
    for (let r = m.s.r; r <= m.e.r; r++) {
      if (!rows[r]) rows[r] = [];
      for (let c = m.s.c; c <= m.e.c; c++) rows[r][c] = val;
    }
    if (m.s.c === 1) for (let r = m.s.r + 1; r <= m.e.r; r++) bContinuation.add(r);
  });

  // Column pattern, repeating indefinitely:
  //   A(0) typed phrasings → B(1) response
  //   C(2) options         → D(3) reply     ← level 0
  //   E(4) options         → F(5) reply     ← level 1
  //   G(6) options         → H(7) reply     ← level 2  … and so on.
  // Even columns (2,4,6…) are option inputs; the odd column to their right
  // is that option's reply. Each option group becomes one "level"; after the
  // user answers a level, the next non-empty level's options are offered.
  const intents = []; let cur = null;
  for (let i = 1; i < rows.length; i++) { // skip header row
    const a = clean(rows[i][0]), b = clean(rows[i][1]);
    if (b && !bContinuation.has(i)) {
      cur = { id: "intent_" + (intents.length + 1), patterns: [], response: b, levelsByCol: {} };
      intents.push(cur);
    }
    if (!cur) continue;
    if (a) cur.patterns.push(a);
    for (let c = 2; c <= lastCol; c += 2) {          // every option-input column
      const label = clean(rows[i][c]);
      if (!label) continue;
      const reply = clean(rows[i][c + 1] ?? "");     // paired reply column
      (cur.levelsByCol[c] ||= []).push({ label, reply });
    }
  }

  intents.forEach(it => {
    // Compact the per-column groups (in column order) into a level list, so a
    // topic with options in C and G but not E still chains C → G cleanly.
    it.levels = Object.keys(it.levelsByCol).map(Number).sort((x, y) => x - y)
                      .map(c => it.levelsByCol[c]);
    delete it.levelsByCol;
    it.norm = it.patterns.map(normalize);
  });
  return intents.filter(it => it.patterns.length);
}

function parseSettings(ws){
  const resp = { ...DEFAULT_RESP };
  const keys = ["", "", ""];
  if (!ws) return { resp, keys };
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
  for (const r of rows) {
    const rawKey = String(r[0] ?? "").trim();
    if (!rawKey) continue;
    const key = rawKey.toUpperCase().replace(/\s+/g, "_"); // "Api Key 1" -> "API_KEY_1"
    const val = String(r[1] ?? "").replace(/\r\n/g, "\n").trim();
    if (key in resp) { if (val) resp[key] = val; }        // blank keeps the default
    else if (key === "API_KEY_1") keys[0] = val;
    else if (key === "API_KEY_2") keys[1] = val;
    else if (key === "API_KEY_3") keys[2] = val;
  }
  return { resp, keys };
}

async function loadSpreadsheetFile(file){
  if (!file) return;
  const err = document.getElementById("loadError");
  err.textContent = "";
  try {
    const parsed = await parseWorkbook(file);
    if (!parsed.intents.length) { err.textContent = "No usable rows found — check columns A and B."; return; }
    INTENTS = parsed.intents;
    RESP = parsed.resp;          // response text from Sheet 2 (or defaults)
    SHEET_KEYS = parsed.keys;    // API keys from Sheet 2
    document.getElementById("loader").remove();
    addMsg(RESP.GREETING, "edi");
    input.focus();
  } catch (ex) {
    console.error(ex);
    err.textContent = "Couldn't read that file. Please choose a valid spreadsheet.";
  }
}

document.getElementById("file").addEventListener("change", e => loadSpreadsheetFile(e.target.files[0]));

// Drag & drop — the whole overlay accepts a dropped file; the card highlights.
const loaderEl = document.getElementById("loader");
const loaderCard = loaderEl.querySelector(".card");
["dragenter","dragover"].forEach(ev => loaderEl.addEventListener(ev, e => {
  e.preventDefault(); loaderCard.classList.add("over");
}));
["dragleave","drop"].forEach(ev => loaderEl.addEventListener(ev, e => {
  e.preventDefault(); loaderCard.classList.remove("over");
}));
loaderEl.addEventListener("drop", e => loadSpreadsheetFile(e.dataTransfer.files[0]));

/* ===================== API KEYS ===================== */
/* Priority: keys from Sheet 2, then any entered via the ~ developer menu. */
function loadKeys(){ try { return JSON.parse(localStorage.getItem(KEYS_STORAGE)) || ["","",""]; } catch { return ["","",""]; } }
function activeKeys(){
  const sheetK = (SHEET_KEYS || []).filter(k => k && k.trim());
  if (sheetK.length) return sheetK;
  return loadKeys().filter(k => k && k.trim());
}

/* ===================== DEVELOPER MENU (~) ===================== */
const dev = document.getElementById("dev");
const lockView = document.getElementById("lockView");
const keysView = document.getElementById("keysView");
const devMsg = document.getElementById("devMsg");
const pw = document.getElementById("pw");
const keyInputs = [1,2,3].map(n => document.getElementById("k" + n));
let unlocked = false;

function openDev(){
  dev.classList.add("open");
  if (unlocked) keyInputs[0].focus(); else { pw.value = ""; pw.focus(); }
  devMsg.textContent = "";
}
function closeDev(){ dev.classList.remove("open"); }
function tryUnlock(){
  if (pw.value === DEV_PASSWORD) {
    unlocked = true;
    lockView.classList.add("hide");
    keysView.classList.add("show");
    loadKeys().forEach((v,i) => keyInputs[i].value = v);
    devMsg.className = "msg-line"; devMsg.textContent = "";
    keyInputs[0].focus();
  } else {
    devMsg.className = "msg-line err"; devMsg.textContent = "Incorrect password.";
    pw.value = ""; pw.focus();
  }
}
function saveKeys(){
  localStorage.setItem(KEYS_STORAGE, JSON.stringify(keyInputs.map(i => i.value.trim())));
  devMsg.className = "msg-line ok"; devMsg.textContent = "Saved \u2713";
  clearTimeout(saveKeys._t);
  saveKeys._t = setTimeout(() => devMsg.textContent = "", 1500);
}
document.getElementById("unlock").addEventListener("click", tryUnlock);
pw.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });
keyInputs.forEach(i => i.addEventListener("input", saveKeys));
document.addEventListener("keydown", (e) => {
  if (e.key === "~") { e.preventDefault(); dev.classList.contains("open") ? closeDev() : openDev(); }
  else if (e.key === "Escape" && dev.classList.contains("open")) closeDev();
});
dev.addEventListener("click", e => { if (e.target === dev) closeDev(); });

/* ===================== GEMINI FALLBACK ===================== */
async function callGemini(prompt) {
  const keys = activeKeys();
  if (!keys.length) return { noKeys: true };
  let lastErr = null;
  for (const key of keys) {
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent`,
        { method: "POST",
          headers: { "Content-Type": "application/json", "x-goog-api-key": key },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0, responseMimeType: "application/json" }
          }) }
      );
      if (!res.ok) { lastErr = new Error("HTTP " + res.status); continue; }
      const data = await res.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) { lastErr = new Error("empty"); continue; }
      return JSON.parse(text);
    } catch (e) { lastErr = e; }
  }
  console.warn("All keys failed:", lastErr);
  return null;
}
function buildPrompt(userText) {
  const intentList = INTENTS.map(it =>
    `- id "${it.id}": example phrasings: ${it.patterns.map(p => `"${p}"`).join(", ")}`).join("\n");
  let optionBlock = "";
  if (pending) {
    optionBlock = `\nThe assistant just asked a multiple-choice question. Options: ${pending.options.map(o => `"${o.label}"`).join(", ")}\nIf the user is choosing one (even loosely), return {"type":"option","value":"<exact option label>"}. If they changed subject, classify against intents.`;
  }
  return `You are an intent classifier. Respond ONLY with minified JSON, no markdown.

Known intents:
${intentList}
${optionBlock}

User message: "${userText}"

Rules:
- If it matches an intent's meaning, return {"type":"intent","value":"<intent id>"}.
- ${pending ? 'Prefer "option" if it plausibly answers the pending question.' : ""}
- If nothing fits, return {"type":"none"}.`;
}

/* ===================== MATCHING ===================== */
// pending = { intent, levelIndex, options } — the option group currently on screen.
let pending = null;
function exactIntentMatch(text){ const n = normalize(text); return INTENTS.find(it => it.norm.includes(n)) || null; }
function optionInList(text, options){ const n = normalize(text); return options.find(o => normalize(o.label) === n) || null; }

/* ===================== CHAT UI ===================== */
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");

input.value = HINT_TEXT; input.classList.add("hint");
input.addEventListener("focus", () => { if (input.classList.contains("hint")) { input.value = ""; input.classList.remove("hint"); } });
input.addEventListener("blur", () => { if (!input.value.trim()) { input.value = HINT_TEXT; input.classList.add("hint"); } });

function addMsg(text, who){
  const d = document.createElement("div"); d.className = "msg " + who; d.textContent = text;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight; return d;
}
function offerOptions(intent, levelIndex){
  const options = intent.levels[levelIndex];
  const wrap = document.createElement("div"); wrap.className = "chips";
  options.forEach(o => {
    const b = document.createElement("button"); b.type = "button"; b.textContent = o.label;
    // The button remembers exactly which option it is, so clicking an OLD
    // chip from earlier in the chat still resolves correctly and moves on —
    // it never falls through to the "no match" path.
    b.addEventListener("click", () => chooseOption(intent, levelIndex, o));
    wrap.appendChild(b);
  });
  chat.appendChild(wrap); chat.scrollTop = chat.scrollHeight;
  pending = { intent, levelIndex, options };
}
function showThinking(){
  const d = document.createElement("div"); d.className = "thinking";
  d.innerHTML = "<span></span><span></span><span></span>";
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight; return d;
}

// Show a topic's response, then offer its first option group (if any).
function serveTopic(intent){
  addMsg(intent.response, "edi");
  pending = null;
  if (intent.levels.length) offerOptions(intent, 0);
}
// Resolve a chosen option: echo it, show its reply, then advance to the next
// option group in the SAME topic (if one exists). Works for current or old chips.
// echo=false when the user's message was already shown (typed / AI-matched).
function chooseOption(intent, levelIndex, option, echo = true){
  if (echo) addMsg(option.label, "user");
  const reply = option.reply?.trim() ? option.reply : RESP.DEFAULT_OPTION.replace("{label}", option.label);
  addMsg(reply, "edi");
  pending = null;
  const next = levelIndex + 1;
  if (intent.levels[next]) offerOptions(intent, next);
  input.focus();
}

async function handleUserText(text){
  if (!text.trim() || !INTENTS.length) return;
  addMsg(text, "user");
  input.value = ""; input.classList.remove("hint");

  // Typed answer that matches the current on-screen options
  if (pending) { const opt = optionInList(text, pending.options); if (opt) { chooseOption(pending.intent, pending.levelIndex, opt, false); return; } }
  // Typed a top-level phrasing → jump to that topic
  const exact = exactIntentMatch(text); if (exact) { serveTopic(exact); return; }

  const spinner = showThinking();
  const result = await callGemini(buildPrompt(text));
  spinner.remove();

  // No keys configured = exact-match-only mode: unknown input just gets the
  // normal "no match" reply. API_DOWN is reserved for keys that exist but fail.
  if (result?.noKeys) { addMsg(RESP.NO_MATCH, "edi"); return; }
  if (!result) { addMsg(RESP.API_DOWN, "edi"); return; }
  if (result.type === "option" && pending) {
    const opt = optionInList(result.value || "", pending.options);
    if (opt) { chooseOption(pending.intent, pending.levelIndex, opt, false); return; }
  }
  if (result.type === "intent") { const it = INTENTS.find(i => i.id === result.value); if (it) { serveTopic(it); return; } }
  addMsg(RESP.NO_MATCH, "edi");
}

form.addEventListener("submit", (e) => {
  e.preventDefault();
  if (input.classList.contains("hint")) return;
  handleUserText(input.value);
});

/* ===================== INIT ===================== */
/* Nothing loads until a spreadsheet is chosen — responses, options, and API
   keys all come from that one offline file. */
</script>
</body>
</html>
