<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#B0142E; --red-dark:#8E1025;
    --titanium:#77736F; --ink:#1D1B19;
    --paper:#FFFFFF; --bg:#FBFAF9; --line:#ECEAE8; --hint:#B8B4AF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    display:flex;flex-direction:column;align-items:center;
    -webkit-font-smoothing:antialiased;
  }

  header{
    width:100%;padding:34px 20px 20px;text-align:center;
  }
  header h1{
    font-size:30px;font-weight:600;letter-spacing:-0.02em;
  }

  main{
    width:100%;max-width:680px;flex:1;
    display:flex;flex-direction:column;padding:0 18px;
  }
  #chat{
    flex:1;overflow-y:auto;
    display:flex;flex-direction:column;gap:14px;
    padding:8px 2px 20px;
  }
  .msg{
    max-width:78%;
    padding:13px 17px;
    border-radius:20px;
    line-height:1.5;white-space:pre-wrap;
    font-size:15.5px;
    animation:rise .28s ease both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.msg{animation:none}}
  .msg.user{
    align-self:flex-end;background:var(--red);color:#fff;
    border-bottom-right-radius:6px;
  }
  .msg.edi{
    align-self:flex-start;background:var(--paper);
    border:1px solid var(--line);border-bottom-left-radius:6px;
    box-shadow:0 1px 2px rgba(29,27,25,.03);
  }
  .chips{
    align-self:flex-start;display:flex;flex-wrap:wrap;gap:8px;margin:2px 0;
  }
  .chips button{
    font:inherit;font-size:14px;font-weight:500;
    color:var(--ink);background:var(--paper);
    border:1px solid var(--line);border-radius:999px;
    padding:8px 16px;cursor:pointer;transition:all .15s;
  }
  .chips button:hover,.chips button:focus-visible{
    border-color:var(--red);color:var(--red);outline:none;
  }
  .thinking{
    align-self:flex-start;display:flex;gap:5px;
    padding:15px 18px;background:var(--paper);
    border:1px solid var(--line);border-radius:20px;border-bottom-left-radius:6px;
  }
  .thinking span{
    width:7px;height:7px;border-radius:50%;background:var(--titanium);opacity:.35;
    animation:beat 1s infinite;
  }
  .thinking span:nth-child(2){animation-delay:.18s}
  .thinking span:nth-child(3){animation-delay:.36s}
  @keyframes beat{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.9;transform:scale(1.2)}}

  form{
    width:100%;max-width:680px;
    display:flex;gap:10px;align-items:center;
    padding:12px 18px calc(20px + env(safe-area-inset-bottom));
    position:sticky;bottom:0;
    background:linear-gradient(transparent,var(--bg) 34%);
  }
  #input{
    flex:1;font:inherit;font-size:16px;
    padding:14px 20px;
    border:1px solid var(--line);border-radius:999px;
    background:var(--paper);color:var(--ink);
    transition:border-color .15s,box-shadow .15s;
  }
  #input.hint{color:var(--hint)}
  #input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(176,20,46,.10)}
  #send{
    flex:none;width:46px;height:46px;border-radius:50%;
    border:none;background:var(--red);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .15s;
  }
  #send:hover{background:var(--red-dark)}
  #send:focus-visible{outline:2px solid var(--red-dark);outline-offset:2px}
  #send svg{width:20px;height:20px;stroke:#fff;stroke-width:2.4;fill:none}

  /* ---------- Developer menu (~) ---------- */
  #dev{
    position:fixed;inset:0;z-index:40;display:none;
    align-items:flex-start;justify-content:center;
    background:rgba(29,27,25,.35);backdrop-filter:blur(3px);
    padding:16vh 20px 20px;
  }
  #dev.open{display:flex}
  #dev .panel{
    background:var(--paper);border:1px solid var(--line);
    border-radius:20px;padding:26px 26px 22px;width:100%;max-width:400px;
    box-shadow:0 24px 60px rgba(29,27,25,.22);
  }
  #dev .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
  #dev h2{font-size:17px;font-weight:600}
  #dev .ver{font-size:12px;color:var(--titanium);font-weight:500}
  #dev label{display:block;font-size:12px;font-weight:600;color:var(--titanium);margin:0 0 6px}
  #dev input{
    width:100%;font:inherit;font-size:14px;
    padding:11px 14px;border:1px solid var(--line);border-radius:12px;
    background:var(--bg);color:var(--ink);margin-bottom:14px;
  }
  #dev input:focus{outline:none;border-color:var(--red)}
  #dev button{
    font:inherit;font-weight:600;font-size:14px;cursor:pointer;
    background:var(--red);color:#fff;border:none;border-radius:999px;
    padding:11px 20px;width:100%;
  }
  #dev button:hover{background:var(--red-dark)}
  #dev .msg-line{font-size:12.5px;margin-top:10px;min-height:1.1em}
  #dev .msg-line.err{color:var(--red)}
  #dev .msg-line.ok{color:#1a7f37}
  #dev .keys{display:none}
  #dev .keys.show{display:block}
  #dev .lock{display:block}
  #dev .lock.hide{display:none}
  #dev .hintline{font-size:12px;color:var(--titanium);margin-top:4px}
</style>
</head>
<body>

<div id="dev" role="dialog" aria-label="Developer menu">
  <div class="panel">
    <div class="top"><h2>Developer</h2><span class="ver">murmur v2</span></div>

    <div class="lock" id="lockView">
      <label for="pw">Password</label>
      <input type="password" id="pw" autocomplete="off" placeholder="Enter password">
      <button id="unlock">Unlock</button>
    </div>

    <div class="keys" id="keysView">
      <label for="k1">Gemini API keys</label>
      <input type="password" id="k1" autocomplete="off" placeholder="API key 1 (primary)">
      <input type="password" id="k2" autocomplete="off" placeholder="API key 2 (backup)">
      <input type="password" id="k3" autocomplete="off" placeholder="API key 3 (backup)">
      <p class="hintline">Saved in this browser. Press ~ to close.</p>
    </div>

    <div class="msg-line" id="devMsg"></div>
  </div>
</div>

<header>
  <h1>Welcome to Edi</h1>
</header>

<main>
  <div id="chat" aria-live="polite"></div>
</main>

<form id="form" autocomplete="off">
  <input id="input" type="text" aria-label="Message Edi">
  <button id="send" type="submit" aria-label="Send">
    <svg viewBox="0 0 24 24"><path d="M12 19V5M6 11l6-6 6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</form>

<script>
/* ===================== CONFIG ===================== */
const MODEL = "gemini-2.5-flash-lite";
const DEV_PASSWORD = "cheeseburger";
const KEYS_STORAGE = "edi_api_keys";
const HINT_TEXT = "What can you do for me, Edi?";
const VERSION = "murmur v2";

/* Built-in fallbacks used only if responses.txt can't be read */
let RESP = {
  GREETING: "Hi, I'm Edi. What can I help you with?",
  NO_MATCH: "I'm not sure I can help with that one.",
  API_DOWN: "I'm having trouble answering right now. Please try again in a moment.",
  DEFAULT_OPTION: "Great choice — {label} it is!"
};
let INTENTS = [];

/* ===================== NORMALIZE ===================== */
const normalize = (s) => s.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu, "").replace(/\s+/g, " ").trim();

/* ===================== LOAD DATA (silent) ===================== */
async function loadResponses(){
  try {
    const txt = await (await fetch("responses.txt", { cache: "no-store" })).text();
    txt.split(/\r?\n/).forEach(line => {
      const t = line.trim();
      if (!t || t.startsWith("#")) return;
      const eq = t.indexOf("=");
      if (eq === -1) return;
      const key = t.slice(0, eq).trim();
      const val = t.slice(eq + 1).trim();
      if (key in RESP) RESP[key] = val;
    });
  } catch (e) { console.warn("responses.txt not loaded, using defaults:", e); }
}
async function loadKnowledge(){
  try {
    const data = await (await fetch("knowledge.json", { cache: "no-store" })).json();
    INTENTS = (data.intents || []).map((it, i) => ({
      id: it.id || ("intent_" + (i + 1)),
      patterns: it.patterns || [],
      response: it.response || "",
      options: it.options || null,
      norm: (it.patterns || []).map(normalize)
    }));
  } catch (e) { console.error("knowledge.json not loaded:", e); INTENTS = []; }
}

/* ===================== API KEYS ===================== */
function loadKeys(){ try { return JSON.parse(localStorage.getItem(KEYS_STORAGE)) || ["","",""]; } catch { return ["","",""]; } }
function activeKeys(){ return loadKeys().filter(k => k && k.trim()); }

/* ===================== DEVELOPER MENU (~) ===================== */
const dev = document.getElementById("dev");
const lockView = document.getElementById("lockView");
const keysView = document.getElementById("keysView");
const devMsg = document.getElementById("devMsg");
const pw = document.getElementById("pw");
const keyInputs = [1,2,3].map(n => document.getElementById("k" + n));
let unlocked = false;

function openDev(){
  dev.classList.add("open");
  if (unlocked) { keyInputs[0].focus(); } else { pw.value = ""; pw.focus(); }
  devMsg.textContent = "";
}
function closeDev(){ dev.classList.remove("open"); }

function tryUnlock(){
  if (pw.value === DEV_PASSWORD) {
    unlocked = true;
    lockView.classList.add("hide");
    keysView.classList.add("show");
    loadKeys().forEach((v,i) => keyInputs[i].value = v);
    devMsg.className = "msg-line";
    devMsg.textContent = "";
    keyInputs[0].focus();
  } else {
    devMsg.className = "msg-line err";
    devMsg.textContent = "Incorrect password.";
    pw.value = ""; pw.focus();
  }
}
function saveKeys(){
  localStorage.setItem(KEYS_STORAGE, JSON.stringify(keyInputs.map(i => i.value.trim())));
  devMsg.className = "msg-line ok";
  devMsg.textContent = "Saved \u2713";
  clearTimeout(saveKeys._t);
  saveKeys._t = setTimeout(() => devMsg.textContent = "", 1500);
}

document.getElementById("unlock").addEventListener("click", tryUnlock);
pw.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });
keyInputs.forEach(i => i.addEventListener("input", saveKeys));

document.addEventListener("keydown", (e) => {
  if (e.key === "~") { e.preventDefault(); dev.classList.contains("open") ? closeDev() : openDev(); }
  else if (e.key === "Escape" && dev.classList.contains("open")) closeDev();
});
dev.addEventListener("click", e => { if (e.target === dev) closeDev(); });

/* ===================== GEMINI FALLBACK ===================== */
async function callGemini(prompt) {
  const keys = activeKeys();
  if (!keys.length) return { noKeys: true };
  let lastErr = null;
  for (const key of keys) {
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent`,
        { method: "POST",
          headers: { "Content-Type": "application/json", "x-goog-api-key": key },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0, responseMimeType: "application/json" }
          }) }
      );
      if (!res.ok) { lastErr = new Error("HTTP " + res.status); continue; }
      const data = await res.json();
      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) { lastErr = new Error("empty"); continue; }
      return JSON.parse(text);
    } catch (e) { lastErr = e; }
  }
  console.warn("All keys failed:", lastErr);
  return null;
}
function buildPrompt(userText) {
  const intentList = INTENTS.map(it =>
    `- id "${it.id}": example phrasings: ${it.patterns.map(p => `"${p}"`).join(", ")}`).join("\n");
  let optionBlock = "";
  if (pendingIntent) {
    optionBlock = `\nThe assistant just asked a multiple-choice question. Options: ${pendingIntent.options.map(o => `"${o.label}"`).join(", ")}\nIf the user is choosing one (even loosely), return {"type":"option","value":"<exact option label>"}. If they changed subject, classify against intents.`;
  }
  return `You are an intent classifier. Respond ONLY with minified JSON, no markdown.

Known intents:
${intentList}
${optionBlock}

User message: "${userText}"

Rules:
- If it matches an intent's meaning, return {"type":"intent","value":"<intent id>"}.
- ${pendingIntent ? 'Prefer "option" if it plausibly answers the pending question.' : ""}
- If nothing fits, return {"type":"none"}.`;
}

/* ===================== MATCHING ===================== */
let pendingIntent = null;
function exactIntentMatch(text){ const n = normalize(text); return INTENTS.find(it => it.norm.includes(n)) || null; }
function exactOptionMatch(text, intent){ const n = normalize(text); return intent.options.find(o => normalize(o.label) === n) || null; }

/* ===================== CHAT UI ===================== */
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");

input.value = HINT_TEXT; input.classList.add("hint");
input.addEventListener("focus", () => { if (input.classList.contains("hint")) { input.value = ""; input.classList.remove("hint"); } });
input.addEventListener("blur", () => { if (!input.value.trim()) { input.value = HINT_TEXT; input.classList.add("hint"); } });

function addMsg(text, who){
  const d = document.createElement("div"); d.className = "msg " + who; d.textContent = text;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight; return d;
}
function addChips(intent){
  const wrap = document.createElement("div"); wrap.className = "chips";
  intent.options.forEach(o => {
    const b = document.createElement("button"); b.type = "button"; b.textContent = o.label;
    b.addEventListener("click", () => handleUserText(o.label));
    wrap.appendChild(b);
  });
  chat.appendChild(wrap); chat.scrollTop = chat.scrollHeight;
}
function showThinking(){
  const d = document.createElement("div"); d.className = "thinking";
  d.innerHTML = "<span></span><span></span><span></span>";
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight; return d;
}
function serveIntent(intent){
  addMsg(intent.response, "edi");
  if (intent.options) { pendingIntent = intent; addChips(intent); } else pendingIntent = null;
}
function serveOption(option){
  const reply = option.response?.trim() ? option.response : RESP.DEFAULT_OPTION.replace("{label}", option.label);
  addMsg(reply, "edi"); pendingIntent = null;
}

async function handleUserText(text){
  if (!text.trim()) return;
  addMsg(text, "user");
  input.value = ""; input.classList.remove("hint");

  if (pendingIntent) { const opt = exactOptionMatch(text, pendingIntent); if (opt) { serveOption(opt); return; } }
  const exact = exactIntentMatch(text); if (exact) { serveIntent(exact); return; }

  const spinner = showThinking();
  const result = await callGemini(buildPrompt(text));
  spinner.remove();

  if (!result || result.noKeys) { addMsg(RESP.API_DOWN, "edi"); pendingIntent = null; return; }
  if (result.type === "option" && pendingIntent) {
    const opt = pendingIntent.options.find(o => normalize(o.label) === normalize(result.value || ""));
    if (opt) { serveOption(opt); return; }
  }
  if (result.type === "intent") { const it = INTENTS.find(i => i.id === result.value); if (it) { serveIntent(it); return; } }
  addMsg(RESP.NO_MATCH, "edi");
}

form.addEventListener("submit", (e) => {
  e.preventDefault();
  if (input.classList.contains("hint")) return;
  handleUserText(input.value);
});

/* ===================== INIT ===================== */
(async function init(){
  await Promise.all([loadResponses(), loadKnowledge()]);
  addMsg(RESP.GREETING, "edi");
})();
</script>
</body>
</html>
